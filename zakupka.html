<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Закупівля</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #111114;
    --surface:  #18181c;
    --card:     #1e1e23;
    --border:   #2a2a32;
    --neon:     #b8ff57;
    --neon-dim: rgba(184,255,87,0.12);
    --neon-glow:rgba(184,255,87,0.25);
    --text:     #f2f2f4;
    --muted:    #5a5a68;
    --sub:      #3a3a46;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    display: none;
    background: none;
    border: none;
    color: var(--neon);
    font-size: 20px;
    cursor: pointer;
    padding: 0 8px 0 0;
    line-height: 1;
  }

  .header-text {}

  .header-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--neon);
    opacity: 0.7;
    margin-bottom: 3px;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  /* ── SCREENS ── */
  .screen { padding: 20px 16px; }
  #itemsScreen { display: none; }

  /* ── SUPPLIER CARDS ── */
  .section-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .supplier-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.12s;
    animation: fadeUp 0.3s ease both;
  }

  .supplier-card:active {
    transform: scale(0.982);
    border-color: var(--neon);
    background: #21212a;
  }

  .supplier-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .supplier-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--sub);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .supplier-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .supplier-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }

  .supplier-arrow {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--neon-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neon);
    font-size: 16px;
    font-weight: 300;
  }

  /* ── ITEMS HERO ── */
  .items-hero {
    margin-bottom: 24px;
  }

  .items-tag {
    display: inline-block;
    background: var(--neon-dim);
    border: 1px solid rgba(184,255,87,0.2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--neon);
    margin-bottom: 12px;
  }

  .items-title {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
  }

  .items-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── DIVIDER ── */
  .hero-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--neon) 0%, transparent 60%);
    opacity: 0.25;
    margin: 16px 0 20px;
  }

  /* ── ITEM ROWS ── */
  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.25s ease both;
  }

  .item-row:last-child { border-bottom: none; }

  .item-num {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
    text-align: right;
  }

  .item-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    opacity: 0.85;
    line-height: 1.4;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<header>
  <button class="back-btn" id="backBtn" onclick="showSuppliers()">←</button>
  <div class="header-text">
    <div class="header-eyebrow" id="headerEyebrow">Ресторан</div>
    <div class="header-title" id="headerTitle">Списки закупівлі</div>
  </div>
</header>

<div class="screen" id="suppliersScreen"></div>

<div class="screen" id="itemsScreen">
  <div class="items-hero">
    <div class="items-tag">Постачальник</div>
    <div class="items-title" id="itemsTitle"></div>
    <div class="items-count" id="itemsCount"></div>
  </div>
  <div class="hero-divider"></div>
  <div id="itemsList"></div>
</div>

<script>
const suppliers = [
  {
    id: 'horeca', name: 'Хорека', emoji: '🥩',
    items: [
      'Манго пюре с.м.','Маракуя пюре (з кісточкою) с.м.','Сир Філадельфія (креметта)',
      'Помідори пілатті','Прошуто','Ковбаса Чорізо','Сир маасдам','Оливкова олія 5 л',
      'Соус Теріякі','Пармезан','Кокосове молоко (банка)','Кальмар трубка с.м.',
      'Мідії у стулках','Тунець філе','Соус солодкий чилі'
    ]
  },
  {
    id: 'zamorozka', name: 'Заморозка', emoji: '🧊',
    items: [
      'Морозиво ванільне','Морозиво шоколадне','Полуниця с.м.','Малина с.м.',
      'Обліпиха с.м.','Вишня с.м.','Зелений горошок с.м.','Спаржева квасоля довга с.м.',
      'Мідії (без раковин) с.м.','Шпинат рубаний с.м.','Броколі с.м.','Манго кубик с.м.'
    ]
  },
  {
    id: 'sushi', name: 'Сушіпродукт', emoji: '🍣',
    items: [
      'Креветки','Норі','Сухарі Панко','Оцет рисовий','Локшина скляна',
      'Соус Шрірача','Рис для суші','Чука','Ікра тобіко'
    ]
  },
  {
    id: 'spices', name: 'Мир спецій', emoji: '🌿',
    items: [
      'Диня цукат','Райське яблуко','Фінік','Чорнослив','Журавлина сушена',
      'Грецький горіх метелик','Горіх кешью','Мигдаль','Арахіс бланшований',
      'Гарбузове насіння','Кунжут білий','Кунжут чорний','Чіа','Кіноа червоне',
      'Нитки чилі','Перець чорний мелений','Перець білий мелений','Спеції барбекю',
      'Базилік сушений','Орегано сушений','Чилі різаний копчений','Чебрець сушений',
      'Паприка копчена мелена','Насіння льону','Сумах','Каєнський перець мелений',
      'Чорний перець горошок','Духмяний перець','Лавровий лист','Куркума',
      'Коріандр мелений','Зіра мелена','Майоран сушений','Кориця мелена',
      'Горіх мускатний мелений','Цукор тростинний','Глутамат','Мигдальний горіх смажений',
      'Нут','Мигдальні пластівці','Розмарин сушений','Фундук смажений','Приправа для ребер'
    ]
  }
];

function renderSuppliers() {
  const screen = document.getElementById('suppliersScreen');
  screen.innerHTML = `<div class="section-label">Постачальники — ${suppliers.length} категорії</div>`;
  suppliers.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'supplier-card';
    card.style.animationDelay = `${i * 0.07}s`;
    card.innerHTML = `
      <div class="supplier-left">
        <div class="supplier-icon">${s.emoji}</div>
        <div>
          <div class="supplier-name">${s.name}</div>
          <div class="supplier-count">${s.items.length} позицій</div>
        </div>
      </div>
      <div class="supplier-arrow">›</div>
    `;
    card.onclick = () => showItems(s.id);
    screen.appendChild(card);
  });
}

function showItems(id) {
  const s = suppliers.find(x => x.id === id);
  document.getElementById('suppliersScreen').style.display = 'none';
  document.getElementById('itemsScreen').style.display = 'block';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerEyebrow').textContent = 'Постачальник';
  document.getElementById('headerTitle').textContent = s.name;
  document.getElementById('itemsTitle').textContent = s.name;
  document.getElementById('itemsCount').textContent = `${s.items.length} позицій`;
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  s.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.style.animationDelay = `${i * 0.022}s`;
    row.innerHTML = `
      <div class="item-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="item-name">${item}</div>
    `;
    list.appendChild(row);
  });
  window.scrollTo(0, 0);
}

function showSuppliers() {
  document.getElementById('suppliersScreen').style.display = 'block';
  document.getElementById('itemsScreen').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerEyebrow').textContent = 'Ресторан';
  document.getElementById('headerTitle').textContent = 'Списки закупівлі';
  window.scrollTo(0, 0);
}

renderSuppliers();
</script>
</body>
</html>
