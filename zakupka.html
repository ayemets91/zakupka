<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Списки закупівлі</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --accent: #e8c96d;
    --accent2: #c97d3a;
    --text: #f0ece0;
    --muted: #888;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
    border-bottom: 2px solid var(--accent);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px 4px 0;
    display: none;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* SUPPLIER LIST */
  .suppliers-screen, .items-screen {
    padding: 20px 16px;
  }

  .items-screen { display: none; }

  .supplier-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .supplier-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
    border-radius: 12px 0 0 12px;
  }

  .supplier-card:active {
    transform: scale(0.98);
    border-color: var(--accent);
  }

  .supplier-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .supplier-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .supplier-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }

  .supplier-count {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .supplier-arrow {
    color: var(--accent);
    font-size: 18px;
  }

  /* ITEMS SCREEN */
  .items-header {
    margin-bottom: 20px;
  }

  .items-supplier-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .items-count {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .item-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .item-row.checked {
    border-color: #2a3d2a;
    background: #161e16;
  }

  .item-row.checked .item-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .item-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    background: transparent;
  }

  .item-row.checked .item-checkbox {
    background: #3a7d3a;
    border-color: #3a7d3a;
  }

  .item-checkbox::after {
    content: '✓';
    color: white;
    font-size: 13px;
    font-weight: 700;
    display: none;
  }

  .item-row.checked .item-checkbox::after {
    display: block;
  }

  .item-name {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    transition: all 0.2s ease;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    margin-top: 12px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 4px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  .reset-btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:active {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 0 8px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <button class="back-btn" id="backBtn" onclick="showSuppliers()">←</button>
    <div>
      <div class="header-title" id="headerTitle">Списки закупівлі</div>
      <div class="header-sub" id="headerSub">Оберіть постачальника</div>
    </div>
  </div>
</header>

<!-- SUPPLIERS LIST -->
<div class="suppliers-screen" id="suppliersScreen">
  <div class="section-label">Постачальники</div>
</div>

<!-- ITEMS SCREEN -->
<div class="items-screen" id="itemsScreen">
  <div class="items-header">
    <div class="items-supplier-name" id="itemsTitle"></div>
    <div class="items-count" id="itemsCount"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div id="itemsList"></div>
  <button class="reset-btn" onclick="resetCurrent()">↺ Скинути відмітки</button>
</div>

<script>
const suppliers = [
  {
    id: 'horeca',
    name: 'Хорека',
    icon: '🥩',
    color: '#c97d3a',
    items: [
      'Манго пюре с.м.',
      'Маракуя пюре (з кісточкою) с.м.',
      'Сир Філадельфія (креметта)',
      'Помідори пілатті',
      'Прошуто',
      'Ковбаса Чорізо',
      'Сир маасдам',
      'Оливкова олія 5 л',
      'Соус Теріякі',
      'Пармезан',
      'Кокосове молоко (банка)',
      'Кальмар трубка с.м.',
      'Мідії у стулках',
      'Тунець філе',
      'Соус солодкий чилі'
    ]
  },
  {
    id: 'zamorozka',
    name: 'Заморозка',
    icon: '🧊',
    color: '#4a9aba',
    items: [
      'Морозиво ванільне',
      'Морозиво шоколадне',
      'Полуниця с.м.',
      'Малина с.м.',
      'Обліпиха с.м.',
      'Вишня с.м.',
      'Зелений горошок с.м.',
      'Спаржева квасоля довга с.м.',
      'Мідії (без раковин) с.м.',
      'Шпинат рубаний с.м.',
      'Броколі с.м.',
      'Манго кубик с.м.'
    ]
  },
  {
    id: 'sushi',
    name: 'Сушіпродукт',
    icon: '🍣',
    color: '#c94a4a',
    items: [
      'Креветки',
      'Норі',
      'Сухарі Панко',
      'Оцет рисовий',
      'Локшина скляна',
      'Соус Шрірача',
      'Рис для суші',
      'Чука',
      'Ікра тобіко'
    ]
  },
  {
    id: 'spices',
    name: 'Мир спецій',
    icon: '🌿',
    color: '#5a9a5a',
    items: [
      'Диня цукат',
      'Райське яблуко',
      'Фінік',
      'Чорнослив',
      'Журавлина сушена',
      'Грецький горіх метелик',
      'Горіх кешью',
      'Мигдаль',
      'Арахіс бланшований',
      'Гарбузове насіння',
      'Кунжут білий',
      'Кунжут чорний',
      'Чіа',
      'Кіноа червоне',
      'Нитки чилі',
      'Перець чорний мелений',
      'Перець білий мелений',
      'Спеції барбекю',
      'Базилік сушений',
      'Орегано сушений',
      'Чилі різаний копчений',
      'Чебрець сушений',
      'Паприка копчена мелена',
      'Насіння льону',
      'Сумах',
      'Каєнський перець мелений',
      'Чорний перець горошок',
      'Духмяний перець',
      'Лавровий лист',
      'Куркума',
      'Коріандр мелений',
      'Зіра мелена',
      'Майоран сушений',
      'Кориця мелена',
      'Горіх мускатний мелений',
      'Цукор тростинний',
      'Глутамат',
      'Мигдальний горіх смажений',
      'Нут',
      'Мигдальні пластівці',
      'Розмарин сушений',
      'Фундук смажений',
      'Приправа для ребер'
    ]
  }
];

let currentSupplier = null;
let checked = {};

// Load from localStorage
try {
  const saved = localStorage.getItem('zakupka_checked');
  if (saved) checked = JSON.parse(saved);
} catch(e) {}

function saveChecked() {
  try { localStorage.setItem('zakupka_checked', JSON.stringify(checked)); } catch(e) {}
}

function renderSuppliers() {
  const screen = document.getElementById('suppliersScreen');
  screen.innerHTML = '<div class="section-label">Постачальники</div>';
  
  suppliers.forEach(s => {
    const total = s.items.length;
    const done = (checked[s.id] || []).length;
    
    const card = document.createElement('div');
    card.className = 'supplier-card';
    card.innerHTML = `
      <div class="supplier-left">
        <div class="supplier-icon" style="background:${s.color}22">${s.icon}</div>
        <div>
          <div class="supplier-name">${s.name}</div>
          <div class="supplier-count">${done > 0 ? `${done} з ${total} відмічено` : `${total} позицій`}</div>
        </div>
      </div>
      <div class="supplier-arrow">›</div>
    `;
    card.style.setProperty('--accent', s.color);
    card.onclick = () => showItems(s.id);
    screen.appendChild(card);
  });
}

function showItems(id) {
  currentSupplier = suppliers.find(s => s.id === id);
  
  document.getElementById('suppliersScreen').style.display = 'none';
  document.getElementById('itemsScreen').style.display = 'block';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerTitle').textContent = currentSupplier.name;
  document.getElementById('headerSub').textContent = 'Список товарів';
  document.getElementById('itemsTitle').textContent = currentSupplier.name;
  
  renderItems();
}

function renderItems() {
  const s = currentSupplier;
  const checkedItems = checked[s.id] || [];
  const total = s.items.length;
  const done = checkedItems.length;
  
  document.getElementById('itemsCount').textContent = `${total} позицій`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
  document.getElementById('progressText').textContent = done === 0 ? '' : `${done} з ${total} перевірено`;
  
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  
  s.items.forEach((item, i) => {
    const isChecked = checkedItems.includes(i);
    const row = document.createElement('div');
    row.className = 'item-row' + (isChecked ? ' checked' : '');
    row.innerHTML = `
      <div class="item-checkbox"></div>
      <div class="item-name">${item}</div>
    `;
    row.onclick = () => toggleItem(i);
    list.appendChild(row);
  });
}

function toggleItem(index) {
  const id = currentSupplier.id;
  if (!checked[id]) checked[id] = [];
  const idx = checked[id].indexOf(index);
  if (idx === -1) checked[id].push(index);
  else checked[id].splice(idx, 1);
  saveChecked();
  renderItems();
  renderSuppliers();
}

function resetCurrent() {
  checked[currentSupplier.id] = [];
  saveChecked();
  renderItems();
  renderSuppliers();
}

function showSuppliers() {
  currentSupplier = null;
  document.getElementById('suppliersScreen').style.display = 'block';
  document.getElementById('itemsScreen').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = 'Списки закупівлі';
  document.getElementById('headerSub').textContent = 'Оберіть постачальника';
  renderSuppliers();
}

renderSuppliers();
</script>
</body>
</html>
